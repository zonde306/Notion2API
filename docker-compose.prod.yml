services:
  notion2api:
    build:
      context: .
      dockerfile: Dockerfile
    image: notion2api:prod
    container_name: notion2api
    restart: unless-stopped
    expose:
      - "8787"
    volumes:
      - ./config.docker.json:/app/config/config.json
      - notion2api-data:/app/data
    environment:
      TZ: Asia/Shanghai
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8787/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    stop_grace_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    command: ["./notion2api", "--config", "/app/config/config.json"]

volumes:
  notion2api-data:
